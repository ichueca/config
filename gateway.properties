server.port=8072
eureka.instance.preferIpAddress = true 
eureka.client.registerWithEureka = true
eureka.client.fetchRegistry = true
eureka.client.serviceUrl.defaultZone=http://eurekaserver:8761/eureka
spring.cloud.gateway.discovery.locator.lowerCaseServiceId=true

spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.routes[0].uri=lb://PRODUCTOS/**
spring.cloud.gateway.routes[0].predicates=Path=/productos/**
spring.cloud.gateway.routes[1].uri=lb://PRODUCTOS/categorias/**
spring.cloud.gateway.routes[1].predicates=Path=/categorias/**

